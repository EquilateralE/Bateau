version: '3.8'

services:
  web:
    image: php:8.2-apache
    container_name: vg_dev_web
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html          # Code source exposé (modifiable à chaud)
    environment:
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vg_dev_net
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"

  db:
    image: mysql:8.0
    container_name: vg_dev_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: vide_grenier
      MYSQL_USER: vg_user
      MYSQL_PASSWORD: vg_pass
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql   # Init SQL exposé
      - vg_dev_db_data:/var/lib/mysql                      # Données persistantes
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "vg_user", "-pvg_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vg_dev_net

volumes:
  vg_dev_db_data:
    name: vg_dev_db_data

networks:
  vg_dev_net:
    name: vg_dev_net
